name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  shell-tests:
    runs-on: ubuntu-latest
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6.0.2

      - name: 🧪 Run shell regression tests
        run: bash tests/run.sh
